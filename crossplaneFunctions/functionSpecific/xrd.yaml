apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.example.crossplane.io
spec:
  group: example.crossplane.io
  names:
    kind: XBuckets
    plural: xbuckets
  claimNames:
    kind: Buckets
    plural: buckets
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                region:
                  type: string
                  description: "AWS region where the buckets will be created"
                names:
                  type: array
                  description: "List of bucket names to create"
                  items:
                    type: string
              required:
                - region
                - names